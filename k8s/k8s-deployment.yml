apiVersion: v1
kind: Namespace
metadata:
  name: boardgame
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: boardgame-app
  namespace: boardgame
  labels:
    app: boardgame-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: boardgame-app
  template:
    metadata:
      labels:
        app: boardgame-app
    spec:
      containers:
        - name: boardgame-app
          image: 122980875414.dkr.ecr.ap-south-1.amazonaws.com/balu-elastic-ecr:boardgame-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: boardgame-svc
  namespace: boardgame
spec:
  type: LoadBalancer
  selector:
    app: boardgame-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080