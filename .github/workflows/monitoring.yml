name: Deploy Monitoring Stack

on:
  workflow_dispatch:

env:
  AWS_REGION: "ap-south-1"
  EKS_CLUSTER_NAME: "balu-cluster22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-monitoring:
    name: 📊 Deploy Prometheus & Grafana
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: "v3.14.0"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Check node capacity
        run: |
          echo "=== Nodes ==="
          kubectl get nodes -o wide
          echo "=== Allocated Resources ==="
          kubectl describe nodes | grep -A8 "Allocated resources" || true

      - name: Add Helm repos
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Create monitoring namespace
        run: |
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

      - name: Cleanup failed release
        run: |
          if helm status kube-prometheus-stack -n monitoring &>/dev/null; then
            STATUS=$(helm status kube-prometheus-stack -n monitoring -o json \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['status'])")
            echo "Existing release status: $STATUS"
            if [ "$STATUS" != "deployed" ]; then
              echo "Removing failed/stuck release..."
              helm uninstall kube-prometheus-stack -n monitoring --wait || true
              kubectl delete pods --all -n monitoring --force --grace-period=0 2>/dev/null || true
              sleep 10
            else
              echo "Release already deployed cleanly — skipping uninstall"
            fi
          else
            echo "No existing release found"
          fi

      - name: Deploy kube-prometheus-stack
        run: |
          helm upgrade --install kube-prometheus-stack \
            prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --set grafana.adminPassword="${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
            --set grafana.service.type=LoadBalancer \
            --set prometheus.service.type=LoadBalancer \
            --set alertmanager.enabled=false \
            --set grafana.persistence.enabled=false \
            --set grafana.sidecar.dashboards.enabled=false \
            --set grafana.sidecar.datasources.enabled=false \
            --set prometheus.prometheusSpec.retention=6h \
            --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
            --set prometheus.prometheusSpec.resources.requests.cpu=100m \
            --set prometheus.prometheusSpec.resources.requests.memory=256Mi \
            --set prometheus.prometheusSpec.resources.limits.cpu=500m \
            --set prometheus.prometheusSpec.resources.limits.memory=512Mi \
            --set grafana.resources.requests.cpu=50m \
            --set grafana.resources.requests.memory=128Mi \
            --set grafana.resources.limits.cpu=200m \
            --set grafana.resources.limits.memory=256Mi \
            --set prometheusOperator.resources.requests.cpu=50m \
            --set prometheusOperator.resources.requests.memory=64Mi \
            --set kube-state-metrics.resources.requests.cpu=10m \
            --set kube-state-metrics.resources.requests.memory=32Mi \
            --timeout 20m \
            --wait

      - name: Wait for LoadBalancers
        run: |
          echo "Waiting for Grafana LoadBalancer (up to 5 min)..."
          for i in $(seq 1 20); do
            GRAFANA_LB=$(kubectl get svc kube-prometheus-stack-grafana \
              -n monitoring \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            if [ -n "$GRAFANA_LB" ]; then
              echo "Grafana LB ready: $GRAFANA_LB"
              break
            fi
            echo "Waiting... ($i/20)"
            sleep 15
          done

      - name: Verify deployments
        run: |
          echo "=== Pods ==="
          kubectl get pods -n monitoring
          echo "=== Services ==="
          kubectl get svc -n monitoring
          GRAFANA_LB=$(kubectl get svc kube-prometheus-stack-grafana \
            -n monitoring \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo 'pending')
          PROMETHEUS_LB=$(kubectl get svc kube-prometheus-stack-prometheus \
            -n monitoring \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo 'pending')
          echo "======================================"
          echo " Grafana:    http://$GRAFANA_LB"
          echo " Prometheus: http://$PROMETHEUS_LB:9090"
          echo "======================================"
          echo "### 📊 Monitoring Stack" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Grafana | http://$GRAFANA_LB |" >> $GITHUB_STEP_SUMMARY
          echo "| Prometheus | http://$PROMETHEUS_LB:9090 |" >> $GITHUB_STEP_SUMMARY
