name: Terraform CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: "1.7.0"
  AWS_REGION: "ap-south-1"
  TF_WORKING_DIR: "."
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Security Scan
  # ─────────────────────────────────────────────
  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov (Terraform security scan)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          framework: terraform
          soft_fail: true
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload Checkov results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: checkov-results.sarif

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true

  # ─────────────────────────────────────────────
  # JOB 2: Terraform Plan
  # ─────────────────────────────────────────────
  terraform-plan:
    name: 📋 Terraform Plan
    runs-on: ubuntu-latest
    needs: security-scan
    environment: plan
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=terraform/jenkins-eks/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="aws_access_key=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -var="aws_secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -var="key_pair_name=${{ secrets.KEY_PAIR_NAME }}" \
            -var="private_key_path=/tmp/ec2_key.pem" \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan_output.txt
          retention-days: 7

      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────
  # JOB 3: Terraform Apply (main branch only)
  # ─────────────────────────────────────────────
  terraform-apply:
    name: 🚀 Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: production
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Write EC2 Private Key
        run: |
          echo "${{ secrets.EC2_PRIVATE_KEY }}" > /tmp/ec2_key.pem
          chmod 600 /tmp/ec2_key.pem

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=terraform/jenkins-eks/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve tfplan

      - name: Capture Terraform Outputs
        id: outputs
        run: |
          terraform output -json > terraform_outputs.json || true
          echo "EC2_IP=$(terraform output -raw ec2_public_ip 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT
          echo "ECR_URL=$(terraform output -raw ecr_repository_url 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT

      - name: Show Outputs in Summary
        run: |
          echo "### ✅ Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| EC2 Public IP | ${{ steps.outputs.outputs.EC2_IP }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Jenkins URL | http://${{ steps.outputs.outputs.EC2_IP }}:8080 |" >> $GITHUB_STEP_SUMMARY
          echo "| SonarQube URL | http://${{ steps.outputs.outputs.EC2_IP }}:9000 |" >> $GITHUB_STEP_SUMMARY
          echo "| ECR URL | ${{ steps.outputs.outputs.ECR_URL }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 4: Docker Build & Push to ECR
  # ─────────────────────────────────────────────
  docker-build-push:
    name: 🐳 Docker Build & Push to ECR
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          ECR_REPO="balu-elastic-ecr"
          IMAGE_TAG="v$(date +'%Y%m%d')-$SHORT_SHA"
          echo "SHORT_SHA=$SHORT_SHA"                           >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=$IMAGE_TAG"                           >> $GITHUB_OUTPUT
          echo "ECR_REGISTRY=$ECR_REGISTRY"                    >> $GITHUB_OUTPUT
          echo "ECR_REPO=$ECR_REPO"                            >> $GITHUB_OUTPUT
          echo "FULL_IMAGE=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "LATEST_IMAGE=$ECR_REGISTRY/$ECR_REPO:latest"   >> $GITHUB_OUTPUT
          echo "--- Image tags ---"
          echo "SHA tag : $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"
          echo "Latest  : $ECR_REGISTRY/$ECR_REPO:latest"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Generate package-lock.json
        run: |
          npm install
          ls -la package-lock.json

      - name: Build Docker image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ steps.tags.outputs.SHORT_SHA }} \
            --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --tag ${{ steps.tags.outputs.FULL_IMAGE }} \
            --tag ${{ steps.tags.outputs.LATEST_IMAGE }} \
            --file Dockerfile \
            .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.tags.outputs.FULL_IMAGE }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          skip-dirs: /usr/local/lib/node_modules/npm,/opt/yarn-v1.22.22

      - name: Push image to ECR
        run: |
          docker push ${{ steps.tags.outputs.FULL_IMAGE }}
          docker push ${{ steps.tags.outputs.LATEST_IMAGE }}

      - name: Show image details in Summary
        run: |
          echo "### 🐳 Docker Image Pushed to ECR" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ECR Registry | ${{ steps.tags.outputs.ECR_REGISTRY }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | ${{ steps.tags.outputs.ECR_REPO }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ steps.tags.outputs.IMAGE_TAG }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Full Image | ${{ steps.tags.outputs.FULL_IMAGE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest | ${{ steps.tags.outputs.LATEST_IMAGE }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 5: Deploy to EKS
  # ─────────────────────────────────────────────
  deploy-to-eks:
    name: 🚢 Deploy to EKS
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name balu-cluster22

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="v$(date +'%Y%m%d')-$SHORT_SHA"
          ECR_REGISTRY="122980875414.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          FULL_IMAGE="$ECR_REGISTRY/balu-elastic-ecr:$IMAGE_TAG"
          echo "FULL_IMAGE=$FULL_IMAGE" >> $GITHUB_OUTPUT
          echo "Deploying image: $FULL_IMAGE"

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s-deployment.yml
          kubectl set image deployment/cloudshield-app \
            cloudshield-app=${{ steps.tag.outputs.FULL_IMAGE }} \
            -n app
          kubectl rollout status deployment/cloudshield-app -n app --timeout=5m

      - name: Get app URL
        run: |
          echo "Waiting for LoadBalancer..."
          sleep 20
          APP_URL=$(kubectl get svc cloudshield-app-svc -n app \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo 'pending')
          echo "======================================"
          echo " App URL: http://$APP_URL"
          echo "======================================"
          echo "### 🚢 App Deployed to EKS" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ steps.tag.outputs.FULL_IMAGE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| App URL | http://$APP_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Health | http://$APP_URL/health |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 6: Terraform Destroy (manual only)
  # ─────────────────────────────────────────────
  terraform-destroy:
    name: 💣 Terraform Destroy
    runs-on: ubuntu-latest
    environment: destroy-approval
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Write EC2 Private Key
        run: |
          echo "${{ secrets.EC2_PRIVATE_KEY }}" > /tmp/ec2_key.pem
          chmod 600 /tmp/ec2_key.pem

      # ── Step 1: Delete all Kubernetes LoadBalancer services ──
      - name: Delete Kubernetes services
        continue-on-error: true
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name balu-cluster22 2>/dev/null || echo "EKS cluster not found - skipping"
          kubectl delete svc --all -n app          2>/dev/null || true
          kubectl delete svc --all -n monitoring   2>/dev/null || true
          echo "Waiting 60s for LBs to release..."
          sleep 60

      # ── Step 2: Delete EKS node group ────────────────────────
      - name: Delete EKS node group
        continue-on-error: true
        run: |
          aws eks delete-nodegroup \
            --cluster-name balu-cluster22 \
            --nodegroup-name balu-cluster22-node-group \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "Node group not found"
          echo "Waiting for node group deletion..."
          aws eks wait nodegroup-deleted \
            --cluster-name balu-cluster22 \
            --nodegroup-name balu-cluster22-node-group \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

      # ── Step 3: Delete EKS cluster ───────────────────────────
      - name: Delete EKS cluster
        continue-on-error: true
        run: |
          aws eks delete-cluster \
            --name balu-cluster22 \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "Cluster not found"
          echo "Waiting for cluster deletion..."
          aws eks wait cluster-deleted \
            --name balu-cluster22 \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

      # ── Step 4: Delete classic load balancers ────────────────
      - name: Delete Classic Load Balancers
        continue-on-error: true
        run: |
          LBS=$(aws elb describe-load-balancers \
            --region ${{ env.AWS_REGION }} \
            --query "LoadBalancerDescriptions[?VPCId=='vpc-0adf624451380abc5'].LoadBalancerName" \
            --output text 2>/dev/null || echo "")
          if [ -n "$LBS" ]; then
            for lb in $LBS; do
              echo "Deleting LB: $lb"
              aws elb delete-load-balancer --load-balancer-name $lb --region ${{ env.AWS_REGION }} || true
            done
            echo "Waiting 60s for LB ENIs to detach..."
            sleep 60
          else
            echo "No classic LBs found"
          fi

      # ── Step 5: Delete orphaned k8s security groups ──────────
      - name: Delete orphaned security groups
        continue-on-error: true
        run: |
          SGS=$(aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=vpc-0adf624451380abc5" \
            --region ${{ env.AWS_REGION }} \
            --query "SecurityGroups[?starts_with(GroupName,'k8s-elb')].GroupId" \
            --output text 2>/dev/null || echo "")
          if [ -n "$SGS" ]; then
            for sg in $SGS; do
              echo "Deleting SG: $sg"
              aws ec2 delete-security-group --group-id $sg --region ${{ env.AWS_REGION }} || true
            done
          else
            echo "No orphaned k8s security groups found"
          fi

      # ── Step 6: Release Elastic IPs ──────────────────────────
      - name: Release Elastic IPs
        continue-on-error: true
        run: |
          EIPS=$(aws ec2 describe-addresses \
            --region ${{ env.AWS_REGION }} \
            --query "Addresses[*].AllocationId" \
            --output text 2>/dev/null || echo "")
          if [ -n "$EIPS" ]; then
            for eip in $EIPS; do
              echo "Releasing EIP: $eip"
              aws ec2 release-address --allocation-id $eip --region ${{ env.AWS_REGION }} || true
            done
          else
            echo "No Elastic IPs found"
          fi

      # ── Step 7: Delete all ECR images ────────────────────────
      - name: Delete ECR images
        continue-on-error: true
        run: |
          ECR_REPO="balu-elastic-ecr"
          echo "Deleting all images from ECR repo: $ECR_REPO"
          IMAGE_IDS=$(aws ecr list-images \
            --repository-name $ECR_REPO \
            --region ${{ env.AWS_REGION }} \
            --query "imageIds[*]" \
            --output json 2>/dev/null || echo "[]")
          if [ "$IMAGE_IDS" != "[]" ] && [ -n "$IMAGE_IDS" ]; then
            aws ecr batch-delete-image \
              --repository-name $ECR_REPO \
              --region ${{ env.AWS_REGION }} \
              --image-ids "$IMAGE_IDS"
            echo "All ECR images deleted"
          else
            echo "No images found in ECR"
          fi

      # ── Step 8: Terraform Init ───────────────────────────────
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=terraform/jenkins-eks/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      # ── Step 9: Terraform Destroy ────────────────────────────
      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var="aws_access_key=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -var="aws_secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -var="key_pair_name=${{ secrets.KEY_PAIR_NAME }}" \
            -var="private_key_path=/tmp/ec2_key.pem" \
            -auto-approve
