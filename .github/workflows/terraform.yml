name: Terraform CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: "1.7.0"
  AWS_REGION: "ap-south-1"
  TF_WORKING_DIR: "."
  EKS_CLUSTER_NAME: "balu-cluster22"
  ECR_REPO: "balu-elastic-ecr"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Security Scan
  # ─────────────────────────────────────────────
  security-scan:
    name: 🔐 Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ${{ env.TF_WORKING_DIR }}
          framework: terraform
          soft_fail: true
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: checkov-results.sarif

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true

  # ─────────────────────────────────────────────
  # JOB 2: Terraform Plan
  # ─────────────────────────────────────────────
  terraform-plan:
    name: 📋 Terraform Plan
    runs-on: ubuntu-latest
    needs: security-scan
    environment: plan
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=terraform/jenkins-eks/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="aws_access_key=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -var="aws_secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -var="key_pair_name=${{ secrets.KEY_PAIR_NAME }}" \
            -var="private_key_path=/tmp/ec2_key.pem" \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan
            ${{ env.TF_WORKING_DIR }}/plan_output.txt
          retention-days: 7

      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────
  # JOB 3: Terraform Apply
  # ─────────────────────────────────────────────
  terraform-apply:
    name: 🚀 Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment: production
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Write EC2 Private Key
        run: |
          echo "${{ secrets.EC2_PRIVATE_KEY }}" > /tmp/ec2_key.pem
          chmod 600 /tmp/ec2_key.pem

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=terraform/jenkins-eks/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Capture Outputs
        id: outputs
        run: |
          terraform output -json > terraform_outputs.json || true
          echo "EC2_IP=$(terraform output -raw ec2_public_ip 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT
          echo "ECR_URL=$(terraform output -raw ecr_repository_url 2>/dev/null || echo 'N/A')" >> $GITHUB_OUTPUT

      - name: Show Outputs
        run: |
          echo "### ✅ Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| EC2 IP | ${{ steps.outputs.outputs.EC2_IP }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ECR URL | ${{ steps.outputs.outputs.ECR_URL }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 4: Docker Build & Push to ECR
  # ─────────────────────────────────────────────
  docker-build-push:
    name: 🐳 Docker Build & Push to ECR
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    outputs:
      full_image: ${{ steps.tags.outputs.FULL_IMAGE }}
      latest_image: ${{ steps.tags.outputs.LATEST_IMAGE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          IMAGE_TAG="boardgame-v$(date +'%Y%m%d')-$SHORT_SHA"
          echo "SHORT_SHA=$SHORT_SHA"                                      >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=$IMAGE_TAG"                                      >> $GITHUB_OUTPUT
          echo "ECR_REGISTRY=$ECR_REGISTRY"                               >> $GITHUB_OUTPUT
          echo "FULL_IMAGE=$ECR_REGISTRY/${{ env.ECR_REPO }}:$IMAGE_TAG"  >> $GITHUB_OUTPUT
          echo "LATEST_IMAGE=$ECR_REGISTRY/${{ env.ECR_REPO }}:boardgame-latest" >> $GITHUB_OUTPUT
          echo "Tag: $ECR_REGISTRY/${{ env.ECR_REPO }}:$IMAGE_TAG"

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ steps.tags.outputs.FULL_IMAGE }} \
            --tag ${{ steps.tags.outputs.LATEST_IMAGE }} \
            --file Dockerfile \
            .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.tags.outputs.FULL_IMAGE }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          skip-dirs: /usr/local/lib/node_modules/npm,/opt/yarn-v1.22.22

      - name: Push image to ECR
        run: |
          docker push ${{ steps.tags.outputs.FULL_IMAGE }}
          docker push ${{ steps.tags.outputs.LATEST_IMAGE }}

      - name: Show image in Summary
        run: |
          echo "### 🐳 Docker Image Pushed" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| versioned | ${{ steps.tags.outputs.FULL_IMAGE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| latest | ${{ steps.tags.outputs.LATEST_IMAGE }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 5: Deploy to EKS + Print URL
  # ─────────────────────────────────────────────
  deploy-to-eks:
    name: 🚢 Deploy to EKS
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image
        id: img
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="boardgame-v$(date +'%Y%m%d')-$SHORT_SHA"
          FULL_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:$IMAGE_TAG"
          echo "FULL_IMAGE=$FULL_IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/k8s-boardgame.yml
          kubectl set image deployment/boardgame-app \
            boardgame-app=${{ steps.img.outputs.FULL_IMAGE }} \
            -n boardgame
          kubectl rollout status deployment/boardgame-app -n boardgame --timeout=10m

      - name: Wait for public URL
        run: |
          echo "Waiting for LoadBalancer URL..."
          for i in $(seq 1 24); do
            APP_URL=$(kubectl get svc boardgame-svc -n boardgame \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            if [ -n "$APP_URL" ]; then
              echo ""
              echo "╔══════════════════════════════════════════════════╗"
              echo "║        ✅  BOARDGAME APP IS LIVE!                ║"
              echo "╠══════════════════════════════════════════════════╣"
              echo "║  🌐  http://$APP_URL"
              echo "╚══════════════════════════════════════════════════╝"
              echo ""
              echo "### 🎮 Boardgame App is LIVE!" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| | URL |" >> $GITHUB_STEP_SUMMARY
              echo "|---|---|" >> $GITHUB_STEP_SUMMARY
              echo "| 🎮 **Boardgame App** | [http://$APP_URL](http://$APP_URL) |" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            echo "Waiting for URL... ($i/24)"
            sleep 15
          done
          echo "⚠️ URL not ready — check: kubectl get svc boardgame-svc -n boardgame"

  # ─────────────────────────────────────────────
  # JOB 6: Terraform Destroy (manual only)
  # ─────────────────────────────────────────────
  terraform-destroy:
    name: 💣 Terraform Destroy
    runs-on: ubuntu-latest
    environment: destroy-approval
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Write EC2 Private Key
        run: |
          echo "${{ secrets.EC2_PRIVATE_KEY }}" > /tmp/ec2_key.pem
          chmod 600 /tmp/ec2_key.pem

      - name: Delete Kubernetes services
        continue-on-error: true
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }} 2>/dev/null || true
          kubectl delete svc --all -n app        2>/dev/null || true
          kubectl delete svc --all -n monitoring 2>/dev/null || true
          echo "Waiting 60s for LBs to release..."
          sleep 60

      - name: Delete EKS node group
        continue-on-error: true
        run: |
          aws eks delete-nodegroup \
            --cluster-name ${{ env.EKS_CLUSTER_NAME }} \
            --nodegroup-name ${{ env.EKS_CLUSTER_NAME }}-node-group \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws eks wait nodegroup-deleted \
            --cluster-name ${{ env.EKS_CLUSTER_NAME }} \
            --nodegroup-name ${{ env.EKS_CLUSTER_NAME }}-node-group \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

      - name: Delete EKS cluster
        continue-on-error: true
        run: |
          aws eks delete-cluster \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws eks wait cluster-deleted \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

      - name: Delete Classic Load Balancers
        continue-on-error: true
        run: |
          LBS=$(aws elb describe-load-balancers \
            --region ${{ env.AWS_REGION }} \
            --query "LoadBalancerDescriptions[*].LoadBalancerName" \
            --output text 2>/dev/null || echo "")
          for lb in $LBS; do
            echo "Deleting LB: $lb"
            aws elb delete-load-balancer --load-balancer-name $lb --region ${{ env.AWS_REGION }} || true
          done
          sleep 60

      - name: Delete orphaned security groups
        continue-on-error: true
        run: |
          SGS=$(aws ec2 describe-security-groups \
            --filters "Name=tag-key,Values=kubernetes.io/cluster/${{ env.EKS_CLUSTER_NAME }}" \
            --region ${{ env.AWS_REGION }} \
            --query "SecurityGroups[*].GroupId" \
            --output text 2>/dev/null || echo "")
          K8SELB=$(aws ec2 describe-security-groups \
            --region ${{ env.AWS_REGION }} \
            --query "SecurityGroups[?starts_with(GroupName,'k8s-elb')].GroupId" \
            --output text 2>/dev/null || echo "")
          for sg in $SGS $K8SELB; do
            echo "Deleting SG: $sg"
            aws ec2 delete-security-group --group-id $sg --region ${{ env.AWS_REGION }} || true
          done

      - name: Release Elastic IPs
        continue-on-error: true
        run: |
          EIPS=$(aws ec2 describe-addresses \
            --region ${{ env.AWS_REGION }} \
            --query "Addresses[*].AllocationId" \
            --output text 2>/dev/null || echo "")
          for eip in $EIPS; do
            echo "Releasing EIP: $eip"
            aws ec2 release-address --allocation-id $eip --region ${{ env.AWS_REGION }} || true
          done

      - name: Delete ECR images
        continue-on-error: true
        run: |
          IMAGE_IDS=$(aws ecr list-images \
            --repository-name ${{ env.ECR_REPO }} \
            --region ${{ env.AWS_REGION }} \
            --query "imageIds[*]" \
            --output json 2>/dev/null || echo "[]")
          if [ "$IMAGE_IDS" != "[]" ] && [ -n "$IMAGE_IDS" ]; then
            aws ecr batch-delete-image \
              --repository-name ${{ env.ECR_REPO }} \
              --region ${{ env.AWS_REGION }} \
              --image-ids "$IMAGE_IDS"
            echo "All ECR images deleted"
          fi

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=terraform/jenkins-eks/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var="aws_access_key=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -var="aws_secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -var="key_pair_name=${{ secrets.KEY_PAIR_NAME }}" \
            -var="private_key_path=/tmp/ec2_key.pem" \
            -auto-approve